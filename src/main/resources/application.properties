spring.application.name=riserva

spring.datasource.url=jdbc:mysql://localhost:3306/riserva
spring.datasource.username=root
spring.datasource.password=rt90245@
# Driver JDBC (Spring Boot lo rileva automaticamente, ma e' buona pratica specificarlo)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# Configurazione JPA / Hibernate
# ============================================================

# Dialetto SQL: dice a Hibernate come generare SQL specifico per MySQL 8
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Strategia DDL: "validate" controlla che le Entity corrispondano alle tabelle esistenti
# NON crea ne' modifica tabelle (il DDL lo abbiamo gia' scritto noi!)
spring.jpa.hibernate.ddl-auto=create

# Mostra le query SQL generate da Hibernate nella console (utilissimo per imparare)
spring.jpa.show-sql=true

# Formatta le query SQL su piu' righe per renderle leggibili
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# Configurazione HikariCP (connection pool)
# ============================================================

# Numero massimo di connessioni nel pool
spring.datasource.hikari.maximum-pool-size=5

# Timeout per ottenere una connessione dal pool (in millisecondi)
spring.datasource.hikari.connection-timeout=20000